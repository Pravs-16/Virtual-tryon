<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitting Room — Virtual Try-On</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <main class="room">
    <header class="room-header">
      <h1>Fitting&nbsp;Room</h1>
      <p class="sub">Stand back so your shoulders and hips are in frame</p>
    </header>

    <section class="mirror-wrap">
      <div class="mirror">
        <img id="feed" src="{{ url_for('video_feed') }}" alt="Live camera with garment overlay" />
      </div>
    </section>

    <aside class="rail" aria-label="Garment picker">
      <h2>Rack</h2>
      <div id="garment-list" class="garment-list" role="listbox"></div>
      <div class="controls">
        <label class="toggle">
          <input type="checkbox" id="toggle-overlay" checked />
          <span>Garment on</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="toggle-landmarks" />
          <span>Show tracking</span>
        </label>
      </div>
    </aside>
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
